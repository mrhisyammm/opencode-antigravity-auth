name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-bundle:
    name: Verify bundle loads
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify bundle loads
        run: node --input-type=module -e "const m = await import('./dist/bundle.js'); console.log('Exports:', Object.keys(m)); if (!m.GoogleOAuthPlugin) { process.exit(1); } console.log('OK');"
